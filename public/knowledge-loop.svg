<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">CompleteLoop knowledge loop diagram</title>
  <desc id="desc">A circular flow showing how knowledge exists, work happens, coaching observes reality, change is verified, recognition reinforces it, patterns emerge, knowledge is corrected, and re-coaching decreases.</desc>
  <defs>
    <linearGradient id="tealGrad" x1="180" y1="90" x2="1040" y2="770" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11c5ad"/>
      <stop offset="1" stop-color="#102f43"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#089e98"/>
    </marker>
  </defs>

  <rect width="1200" height="860" rx="34" fill="#f8fafc"/>
  <circle cx="600" cy="430" r="278" fill="#e9fbfa" opacity="0.95"/>
  <circle cx="600" cy="430" r="244" fill="none" stroke="#089e98" stroke-opacity="0.18" stroke-width="34"/>
  <path d="M 600 154 A 276 276 0 1 1 394 246" fill="none" stroke="url(#tealGrad)" stroke-width="18" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <circle cx="600" cy="430" r="126" fill="#102f43"/>
    <circle cx="600" cy="430" r="108" fill="none" stroke="#12c8b4" stroke-opacity="0.35" stroke-width="3"/>
    <text x="600" y="386" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" letter-spacing="2" fill="#9ff5ec">COMPLETELOOP</text>
    <text x="600" y="426" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="900" fill="#ffffff">Coaching</text>
    <text x="600" y="462" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="900" fill="#ffffff">is the signal</text>
    <text x="600" y="500" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#c8f7f3">Evidence becomes improvement</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(470 36)">
      <rect width="260" height="96" rx="18" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="22" y="34" font-size="17" font-weight="900" fill="#0f172a">Knowledge exists</text>
      <text x="22" y="60" font-size="13" font-weight="600" fill="#64748b">Standards, training, SOPs,</text>
      <text x="22" y="78" font-size="13" font-weight="600" fill="#64748b">and expectations guide work.</text>
    </g>
    <g transform="translate(836 140)">
      <rect width="260" height="96" rx="18" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="22" y="34" font-size="17" font-weight="900" fill="#0f172a">Work happens</text>
      <text x="22" y="60" font-size="13" font-weight="600" fill="#64748b">Real behaviour shows whether</text>
      <text x="22" y="78" font-size="13" font-weight="600" fill="#64748b">knowledge matches reality.</text>
    </g>
    <g transform="translate(890 382)">
      <rect width="260" height="110" rx="18" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="22" y="34" font-size="17" font-weight="900" fill="#0f172a">Coaching observes</text>
      <text x="22" y="56" font-size="17" font-weight="900" fill="#0f172a">reality</text>
      <text x="22" y="82" font-size="13" font-weight="600" fill="#64748b">Managers compare expected</text>
      <text x="22" y="100" font-size="13" font-weight="600" fill="#64748b">behaviour to actual behaviour.</text>
    </g>
    <g transform="translate(800 656)">
      <rect width="260" height="96" rx="18" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="22" y="34" font-size="17" font-weight="900" fill="#0f172a">Change is verified</text>
      <text x="22" y="60" font-size="13" font-weight="600" fill="#64748b">Follow-up proves whether</text>
      <text x="22" y="78" font-size="13" font-weight="600" fill="#64748b">the behaviour changed.</text>
    </g>
    <g transform="translate(470 724)">
      <rect width="260" height="96" rx="18" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="22" y="34" font-size="17" font-weight="900" fill="#0f172a">Recognition reinforces it</text>
      <text x="22" y="60" font-size="13" font-weight="600" fill="#64748b">Precise praise helps the</text>
      <text x="22" y="78" font-size="13" font-weight="600" fill="#64748b">improvement stick.</text>
    </g>
    <g transform="translate(140 656)">
      <rect width="260" height="96" rx="18" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="22" y="34" font-size="17" font-weight="900" fill="#0f172a">Patterns emerge</text>
      <text x="22" y="60" font-size="13" font-weight="600" fill="#64748b">Repeated coaching shows</text>
      <text x="22" y="78" font-size="13" font-weight="600" fill="#64748b">what is working or broken.</text>
    </g>
    <g transform="translate(50 382)">
      <rect width="260" height="110" rx="18" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="22" y="34" font-size="17" font-weight="900" fill="#0f172a">Knowledge is corrected</text>
      <text x="22" y="64" font-size="13" font-weight="600" fill="#64748b">Training, SOPs, standards,</text>
      <text x="22" y="82" font-size="13" font-weight="600" fill="#64748b">and support systems get</text>
      <text x="22" y="100" font-size="13" font-weight="600" fill="#64748b">updated.</text>
    </g>
    <g transform="translate(104 140)">
      <rect width="260" height="96" rx="18" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="22" y="34" font-size="17" font-weight="900" fill="#0f172a">Re-coaching decreases</text>
      <text x="22" y="60" font-size="13" font-weight="600" fill="#64748b">The fix works when the same</text>
      <text x="22" y="78" font-size="13" font-weight="600" fill="#64748b">issue appears less often.</text>
    </g>
  </g>
</svg>
