<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">CompleteLoop knowledge loop diagram</title>
  <desc id="desc">A circular flow showing how knowledge exists, work happens, coaching observes reality, change is verified, recognition reinforces it, patterns emerge, knowledge is corrected, and re-coaching decreases.</desc>
  <defs>
    <linearGradient id="tealGrad" x1="180" y1="90" x2="1040" y2="770" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12c8b4"/>
      <stop offset="1" stop-color="#102f43"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#089e98"/>
    </marker>
  </defs>

  <rect width="1200" height="860" rx="34" fill="#f8fafc"/>
  <circle cx="600" cy="430" r="286" fill="#e9fbfa" opacity="0.95"/>
  <circle cx="600" cy="430" r="252" fill="none" stroke="#089e98" stroke-opacity="0.16" stroke-width="34"/>
  <path d="M 600 144 A 286 286 0 1 1 390 238" fill="none" stroke="url(#tealGrad)" stroke-width="20" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <circle cx="600" cy="430" r="138" fill="#102f43"/>
    <circle cx="600" cy="430" r="118" fill="none" stroke="#12c8b4" stroke-opacity="0.35" stroke-width="3"/>
    <rect x="494" y="330" width="212" height="62" rx="22" fill="#ffffff"/>
    <image href="/public/lightbg.png" x="512" y="343" width="176" height="36" preserveAspectRatio="xMidYMid meet"/>
    <text x="600" y="442" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#ffffff">Coaching is</text>
    <text x="600" y="482" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#ffffff">the signal</text>
    <rect x="497" y="512" width="206" height="34" rx="17" fill="#12c8b4" fill-opacity="0.18" stroke="#12c8b4" stroke-opacity="0.38"/>
    <text x="600" y="535" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#d9fbf8">Find what needs fixing</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(455 30)">
      <rect width="290" height="106" rx="20" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="24" y="38" font-size="20" font-weight="900" fill="#0f172a">Knowledge exists</text>
      <text x="24" y="68" font-size="15" font-weight="650" fill="#64748b">Standards, training, SOPs,</text>
      <text x="24" y="88" font-size="15" font-weight="650" fill="#64748b">and expectations guide work.</text>
    </g>
    <g transform="translate(830 136)">
      <rect width="290" height="106" rx="20" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="24" y="38" font-size="20" font-weight="900" fill="#0f172a">Work happens</text>
      <text x="24" y="68" font-size="15" font-weight="650" fill="#64748b">Real behaviour shows whether</text>
      <text x="24" y="88" font-size="15" font-weight="650" fill="#64748b">knowledge matches reality.</text>
    </g>
    <g transform="translate(882 374)">
      <rect width="290" height="122" rx="20" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="24" y="38" font-size="20" font-weight="900" fill="#0f172a">Coaching observes</text>
      <text x="24" y="62" font-size="20" font-weight="900" fill="#0f172a">reality</text>
      <text x="24" y="92" font-size="15" font-weight="650" fill="#64748b">Managers compare expected</text>
      <text x="24" y="112" font-size="15" font-weight="650" fill="#64748b">behaviour to actual behaviour.</text>
    </g>
    <g transform="translate(790 652)">
      <rect width="290" height="106" rx="20" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="24" y="38" font-size="20" font-weight="900" fill="#0f172a">Change is verified</text>
      <text x="24" y="68" font-size="15" font-weight="650" fill="#64748b">Follow-up proves whether</text>
      <text x="24" y="88" font-size="15" font-weight="650" fill="#64748b">the behaviour changed.</text>
    </g>
    <g transform="translate(455 724)">
      <rect width="290" height="106" rx="20" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="24" y="38" font-size="20" font-weight="900" fill="#0f172a">Recognition reinforces it</text>
      <text x="24" y="68" font-size="15" font-weight="650" fill="#64748b">Precise praise helps the</text>
      <text x="24" y="88" font-size="15" font-weight="650" fill="#64748b">improvement stick.</text>
    </g>
    <g transform="translate(120 652)">
      <rect width="290" height="106" rx="20" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="24" y="38" font-size="20" font-weight="900" fill="#0f172a">Patterns emerge</text>
      <text x="24" y="68" font-size="15" font-weight="650" fill="#64748b">Repeated coaching shows</text>
      <text x="24" y="88" font-size="15" font-weight="650" fill="#64748b">what is working or broken.</text>
    </g>
    <g transform="translate(28 374)">
      <rect width="290" height="122" rx="20" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="24" y="38" font-size="20" font-weight="900" fill="#0f172a">Knowledge is corrected</text>
      <text x="24" y="72" font-size="15" font-weight="650" fill="#64748b">Training, SOPs, standards,</text>
      <text x="24" y="92" font-size="15" font-weight="650" fill="#64748b">and support systems get</text>
      <text x="24" y="112" font-size="15" font-weight="650" fill="#64748b">updated.</text>
    </g>
    <g transform="translate(80 136)">
      <rect width="290" height="106" rx="20" fill="#ffffff" stroke="#dbe3ea"/>
      <text x="24" y="38" font-size="20" font-weight="900" fill="#0f172a">Re-coaching decreases</text>
      <text x="24" y="68" font-size="15" font-weight="650" fill="#64748b">The fix works when the same</text>
      <text x="24" y="88" font-size="15" font-weight="650" fill="#64748b">issue appears less often.</text>
    </g>
  </g>
</svg>
